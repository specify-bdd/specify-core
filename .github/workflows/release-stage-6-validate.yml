name: Release Stage 6 - Validate
on:
  workflow_call:
    inputs:
      git_tag:
        description: "The Git tag produced by stage 1"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      git_tag:
        description: "The Git tag produced by stage 1"
        required: true
        type: string
permissions:
  contents: read
concurrency:
  group: release-stages
jobs:
  validate:
    name: Validate published package
    runs-on: ubuntu-${{ vars.UBUNTU_VERSION }}
    env:
      GIT_BRANCH: main
    steps:
      - name: Check out validate repository code
        uses: actions/checkout@v6
        with:
          ref: ${{ env.GIT_BRANCH }}
          repository: specify-bdd/validate
          submodules: true
      - name: Setup Node.js ${{ vars.NODE_LTS_ACTIVE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ vars.NODE_LTS_ACTIVE_VERSION }}
      - name: Install latest package versions
        run: npm run update-specify -- ${{ inputs.git_tag }}
      - name: Update submodule code
        run: git fetch origin --tags && git switch -d ${{ inputs.git_tag }}
        working-directory: ./specify
      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2
        with:
          install-chromedriver: true
      - name: Run test suite
        run: npx specify test specify/features
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
          CHROMEDRIVER_PATH: ${{ steps.setup-chrome.outputs.chromedriver-path }}
